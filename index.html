<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Bolso">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<title>Meu Bolso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;--bg2:#13131e;--bg3:#1c1c2a;--bg4:#252534;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f8;--text2:#8080a8;--text3:#404060;
  --accent:#7c6aff;--accent2:#a99dff;
  --green:#1fc98a;--red:#ff4d61;--amber:#ffaa1a;--teal:#1acfff;
  --r:13px;--rs:8px;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fm);font-size:15px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
h1,h2,h3,h4,h5,label,.label{font-family:var(--fh)}
button{cursor:pointer;font-family:inherit}
input,select{font-family:var(--fm)}

/* Layout */
#app{display:flex;min-height:100vh}
.sidebar{width:210px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);padding:1.75rem 1rem;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{font-family:var(--fh);font-size:1.3rem;font-weight:800;margin-bottom:2rem;padding-left:4px}
.logo span{color:var(--accent)}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border-radius:var(--rs);background:none;border:none;color:var(--text2);font-family:var(--fh);font-size:.82rem;font-weight:600;text-align:left;transition:.12s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--bg3);color:var(--accent2)}
.nav-btn svg{flex-shrink:0;opacity:.7}
.nav-btn.active svg{opacity:1}
.content{flex:1;padding:1.75rem 2rem 2rem;overflow-y:auto;max-height:100vh}

/* Mobile */
@media(max-width:700px){
  .sidebar{display:none}
  #app{flex-direction:column}
  .content{padding:1rem .85rem 5rem;max-height:none}
  .bnav{display:flex!important}
}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text3);font-family:var(--fh);font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 2px;transition:.12s}
.bnav-btn.active{color:var(--accent2)}
.bnav-btn svg{width:21px;height:21px}

/* Screen */
.screen{display:none}.screen.on{display:block;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ph{margin-bottom:1.25rem}
.ph h2{font-size:1.45rem;font-weight:800}
.ph p{font-size:.75rem;color:var(--text2);margin-top:2px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:.85rem 1rem}

/* Saldo hero */
.saldo-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.25rem;margin-bottom:1rem;position:relative;overflow:hidden}
.saldo-hero::after{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;background:radial-gradient(circle,rgba(124,106,255,.13),transparent 70%);pointer-events:none}
.saldo-lbl{font-size:.68rem;font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text2);margin-bottom:6px}
.saldo-val{font-size:2rem;font-weight:300;letter-spacing:-.02em;line-height:1}
.saldo-row{display:flex;gap:1.2rem;margin-top:.85rem;flex-wrap:wrap}
.saldo-sub{font-size:.7rem;display:flex;align-items:center;gap:5px}
.saldo-sub span:first-child{color:var(--text2)}

/* Metrics grid */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1rem}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem}
.metric-lbl{font-size:.65rem;font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:5px}
.metric-val{font-size:1.2rem;font-weight:400}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.accent{color:var(--accent2)}

/* Progress */
.pbar-wrap{margin-top:8px}
.pbar-lbl{display:flex;justify-content:space-between;font-size:.68rem;color:var(--text2);margin-bottom:4px}
.pbar{height:5px;background:var(--bg4);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.pf-green{background:var(--green)}.pf-amber{background:var(--amber)}.pf-red{background:var(--red)}.pf-accent{background:var(--accent)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-family:var(--fh);font-size:.8rem;font-weight:700;border:none;transition:.14s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:transparent;border:1px solid rgba(255,77,97,.35);color:var(--red)}
.btn-danger:hover{background:rgba(255,77,97,.1)}
.btn-sm{padding:5px 11px;font-size:.72rem}
.btn-full{width:100%;padding:11px}

/* FAB */
.fab{position:fixed;bottom:68px;right:1.2rem;width:50px;height:50px;background:var(--accent);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 4px 18px rgba(124,106,255,.45);transition:.15s}
.fab:hover{transform:scale(1.08)}
@media(min-width:701px){.fab{bottom:1.5rem;right:2rem}}

/* Transactions */
.tx-list{display:flex;flex-direction:column;gap:2px}
.tx-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:.1s}
.tx-item:hover{background:var(--bg3)}
.tx-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.95rem}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:.8rem;font-family:var(--fh);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cat{font-size:.65rem;color:var(--text2);margin-top:1px}
.tx-amt{font-size:.82rem;font-weight:500;flex-shrink:0}
.tx-amt.credit{color:var(--green)}.tx-amt.debit{color:var(--text)}
.tx-dt{font-size:.62rem;color:var(--text3);flex-shrink:0}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
@media(min-width:600px){.overlay{align-items:center}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;padding:1.4rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;animation:slideUp .22s ease}
@media(min-width:600px){.modal{border-radius:var(--r);max-height:85vh}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.mh h3{font-size:1rem;font-weight:700}
.mclose{background:none;border:none;color:var(--text2);padding:4px;border-radius:6px;display:flex}
.mclose:hover{color:var(--text);background:var(--bg3)}

/* Form */
.fg{margin-bottom:.9rem}
.fl{display:block;font-size:.68rem;font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:9px 11px;font-family:var(--fm);font-size:.88rem;color:var(--text);outline:none;transition:.12s}
.fi:focus{border-color:var(--accent)}
.fi option{background:var(--bg3)}
.type-toggle{display:flex;gap:6px}
.type-btn{flex:1;padding:8px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;font-family:var(--fh);font-size:.78rem;font-weight:700;color:var(--text2);transition:.12s}
.type-btn.tdebit{background:rgba(255,77,97,.12);border-color:var(--red);color:var(--red)}
.type-btn.tcredit{background:rgba(31,201,138,.12);border-color:var(--green);color:var(--green)}
.cat-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.cpill{padding:3px 9px;border-radius:99px;border:1px solid var(--border2);background:var(--bg3);font-size:.68rem;font-family:var(--fh);color:var(--text2);cursor:pointer;transition:.1s}
.cpill:hover{border-color:var(--accent);color:var(--accent2)}

/* Budget */
.bitem{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:.9rem 1rem;margin-bottom:8px}
.bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.bname{font-family:var(--fh);font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:7px}
.bamts{font-size:.7rem;color:var(--text2)}

/* Goals */
.gg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(min-width:500px){.gg{grid-template-columns:repeat(3,1fr)}}
.gcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.95rem;cursor:pointer;transition:.12s}
.gcard:hover{border-color:var(--border2)}
.gadd{background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--r);padding:.95rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;min-height:110px;transition:.12s}
.gadd:hover{background:var(--bg4)}

/* Investments */
.iitem{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:.9rem 1rem;display:flex;align-items:center;gap:10px;margin-bottom:8px}

/* Section label */
.slabel{font-size:.65rem;font-family:var(--fh);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:1.1rem 0 .55rem}

/* Insight */
.insight{background:linear-gradient(135deg,rgba(124,106,255,.09),rgba(26,207,255,.04));border:1px solid rgba(124,106,255,.22);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1rem;display:flex;gap:9px;font-size:.76rem;color:var(--text2);line-height:1.6}
.insight strong{color:var(--text);font-weight:500}

/* Thermo */
.thermo{display:flex;align-items:center;gap:10px}
.thermo-bar{flex:1;height:10px;background:var(--bg4);border-radius:99px;overflow:hidden}
.thermo-fill{height:100%;border-radius:99px;transition:width .5s ease}
.thermo-val{font-family:var(--fm);font-size:1rem;white-space:nowrap}

/* Streak */
.streak-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.sdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-family:var(--fh);font-weight:700;border:1px solid var(--border2);color:var(--text3)}
.sdot.done{background:rgba(31,201,138,.18);border-color:var(--green);color:var(--green)}
.sdot.today{border-color:var(--amber);color:var(--amber)}

/* Toast */
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--bg2);border:1px solid var(--accent);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:9px;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);min-width:240px;max-width:88vw;box-shadow:0 6px 28px rgba(0,0,0,.45)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Filter row */
.frow{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:.9rem;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:5px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;font-family:var(--fh);font-size:.7rem;font-weight:700;color:var(--text2);cursor:pointer;transition:.12s;white-space:nowrap}
.fchip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Month nav */
.mnav{display:flex;align-items:center;gap:9px;margin-bottom:1rem}
.mnav button{background:none;border:1px solid var(--border2);border-radius:var(--rs);color:var(--text2);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:.1s}
.mnav button:hover{background:var(--bg3);color:var(--text)}
.mnav span{font-family:var(--fh);font-weight:700;font-size:.88rem;flex:1;text-align:center}

/* Totals row */
.trow{display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:var(--rs);margin-bottom:.9rem}
.titem{text-align:center}
.titem-lbl{font-size:.62rem;font-family:var(--fh);font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.titem-val{font-size:.84rem;margin-top:2px}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;font-family:var(--fh);font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.05em}
.bg-green{background:rgba(31,201,138,.15);color:var(--green)}
.bg-amber{background:rgba(255,170,26,.15);color:var(--amber)}
.bg-red{background:rgba(255,77,97,.15);color:var(--red)}
.bg-accent{background:rgba(124,106,255,.15);color:var(--accent2)}

/* Empty */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.empty-ico{font-size:2.2rem;margin-bottom:8px}
.empty-txt{font-family:var(--fh);font-size:.82rem;font-weight:600}
.empty-sub{font-size:.72rem;margin-top:3px}

/* Row utils */
.row{display:flex;align-items:center;gap:8px}
.row-between{display:flex;justify-content:space-between;align-items:center}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}.mt3{margin-top:1.5rem}
.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar desktop -->
  <nav class="sidebar">
    <div class="logo">meu<span>bolso</span></div>
    <div id="snav"></div>
  </nav>

  <!-- Content -->
  <main class="content" id="content">
    <div class="screen" id="s-dashboard"></div>
    <div class="screen" id="s-extrato"></div>
    <div class="screen" id="s-orcamentos"></div>
    <div class="screen" id="s-metas"></div>
    <div class="screen" id="s-investimentos"></div>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="bnav" id="bnav"></nav>

  <!-- FAB -->
  <button class="fab" id="fab" title="Novo lançamento">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toast-ico" style="font-size:1.3rem">🏆</span>
    <div>
      <div id="toast-title" style="font-family:var(--fh);font-size:.78rem;font-weight:700;color:var(--accent2)"></div>
      <div id="toast-desc" style="font-size:.68rem;color:var(--text2);margin-top:1px"></div>
    </div>
  </div>
</div>

<!-- Modals container -->
<div id="modals"></div>

<script>
// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
const CATS = [
  {id:'alimentacao',name:'Alimentação',emoji:'🍽️',color:'#ff6eb4'},
  {id:'transporte',name:'Transporte',emoji:'🚗',color:'#1acfff'},
  {id:'moradia',name:'Moradia',emoji:'🏠',color:'#ffaa1a'},
  {id:'saude',name:'Saúde',emoji:'🏥',color:'#1fc98a'},
  {id:'lazer',name:'Lazer',emoji:'🎉',color:'#7c6aff'},
  {id:'educacao',name:'Educação',emoji:'📚',color:'#a99dff'},
  {id:'vestuario',name:'Vestuário',emoji:'👗',color:'#ff9966'},
  {id:'delivery',name:'Delivery',emoji:'🛵',color:'#ff4d61'},
  {id:'assinatura',name:'Assinaturas',emoji:'📱',color:'#5588ff'},
  {id:'salario',name:'Salário',emoji:'💰',color:'#1fc98a'},
  {id:'freelance',name:'Freelance',emoji:'💻',color:'#1fc98a'},
  {id:'investimento_rec',name:'Rend. Invest.',emoji:'📈',color:'#1fc98a'},
  {id:'outros',name:'Outros',emoji:'📦',color:'#666'},
];

function cat(id){return CATS.find(c=>c.id===id)||CATS[CATS.length-1]}

let STATE = {
  transactions:[],
  budgets:{},
  goals:[],
  emergency:{custo:0,guardado:0},
  investments:[],
  despFixas:0,
  aiModel:{},
  achievements:[],
  currentScreen:'dashboard',
  currentMonth: new Date(),
  activeFilter:'all',
};

function save(){
  try{localStorage.setItem('mb2',JSON.stringify(STATE))}catch(e){}
}
function load(){
  try{
    const r=localStorage.getItem('mb2');
    if(r){
      const d=JSON.parse(r);
      d.currentMonth=new Date();
      d.activeFilter='all';
      STATE={...STATE,...d};
    }
  }catch(e){}
}
load();

// ──────────────────────────────────────────────
// AI
// ──────────────────────────────────────────────
const KW={
  alimentacao:['restaurante','lanchonete','padaria','mercado','supermercado','hortifruti','açougue','refeição','almoço','jantar','café','pizza','sushi','mcdonalds','burguer','hamburguer','churrasco','sorvete'],
  transporte:['uber','99','cabify','gasolina','combustível','posto','estacionamento','pedágio','ônibus','metro','trem','passagem','carro','moto','táxi'],
  delivery:['ifood','rappi','delivery','entrega'],
  saude:['farmácia','remédio','médico','consulta','exame','dentista','hospital','clinica','plano','convenio'],
  moradia:['aluguel','condomínio','água','luz','energia','gás','internet','telefone','iptu','imóvel'],
  lazer:['cinema','teatro','show','festa','bar','balada','jogo','netflix','spotify','streaming','viagem','hotel','parque'],
  educacao:['curso','faculdade','escola','livro','udemy','alura','mensalidade'],
  vestuario:['roupa','tênis','sapato','loja','shopping','renner','riachuelo','zara'],
  assinatura:['amazon','prime','disney','globo','youtube','apple','google','microsoft','adobe'],
  salario:['salário','pagamento','vencimento','ordenado','holerite','renda'],
  freelance:['freelance','projeto','cliente','honorário','serviço','consultoria'],
};

function aiLearn(desc,catId){
  if(!desc||!catId)return;
  desc.toLowerCase().split(/\s+/).filter(w=>w.length>2).forEach(w=>{
    if(!STATE.aiModel[w])STATE.aiModel[w]={};
    STATE.aiModel[w][catId]=(STATE.aiModel[w][catId]||0)+1;
  });
}

function aiPredict(desc){
  if(!desc)return'';
  const dl=desc.toLowerCase();
  const scores={};
  dl.split(/\s+/).filter(w=>w.length>2).forEach(w=>{
    if(STATE.aiModel[w])
      Object.entries(STATE.aiModel[w]).forEach(([c,n])=>{scores[c]=(scores[c]||0)+n});
  });
  Object.entries(KW).forEach(([c,kws])=>{
    if(kws.some(k=>dl.includes(k)))scores[c]=(scores[c]||0)+5;
  });
  if(!Object.keys(scores).length)return'';
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

function aiTop3(desc){
  if(!desc||desc.length<2)return[];
  const dl=desc.toLowerCase();
  const scores={};
  CATS.forEach(c=>scores[c.id]=0);
  dl.split(/\s+/).filter(w=>w.length>2).forEach(w=>{
    if(STATE.aiModel[w])
      Object.entries(STATE.aiModel[w]).forEach(([c,n])=>{scores[c]=(scores[c]||0)+n});
  });
  Object.entries(KW).forEach(([c,kws])=>{
    if(kws.some(k=>dl.includes(k)))scores[c]=(scores[c]||0)+5;
  });
  return Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]).filter(c=>scores[c]>0);
}

// ──────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────
function fmtBRL(v){return'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function todayISO(){return new Date().toISOString().split('T')[0]}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function monthTxs(year,month){
  return STATE.transactions.filter(t=>{
    const d=new Date(t.date+'T00:00:00');
    return d.getFullYear()===year&&d.getMonth()===month;
  });
}

// ──────────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────────
let toastTimer=null;
function showToast(ico,title,desc){
  document.getElementById('toast-ico').textContent=ico;
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-desc').textContent=desc;
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),4000);
}

function tryUnlock(id,ico,title,desc){
  if(STATE.achievements.includes(id))return;
  STATE.achievements.push(id);
  save();
  showToast(ico,title,desc);
}

function checkAchievements(){
  const n=STATE.transactions.length;
  if(n>=1)tryUnlock('tx1','🎯','Primeiro lançamento!','Sua jornada financeira começa agora.');
  if(n>=10)tryUnlock('tx10','📊','Analista iniciante','10 lançamentos registrados!');
  if(n>=50)tryUnlock('tx50','🏆','Mestre das finanças','50 lançamentos. Você é consistente!');
  if(STATE.goals.length>=1)tryUnlock('goal1','⭐','Sonhador','Primeira meta criada!');
  if(STATE.investments.length>=1)tryUnlock('inv1','📈','Primeiro aporte','Bem-vindo ao mundo dos investimentos!');
}

const NAVS=[

  {id:'extrato',label:'Extrato',icon:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.2"/><circle cx="3" cy="12" r="1.2"/><circle cx="3" cy="18" r="1.2"/>'},
  {id:'orcamentos',label:'Orçamento',icon:'<rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/>'},
  {id:'metas',label:'Metas',icon:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>'},
  {id:'investimentos',label:'Invest.',icon:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>'},
];

function buildNav(){
  const snav=document.getElementById('snav');
  const bnav=document.getElementById('bnav');
  snav.innerHTML='';bnav.innerHTML='';
  NAVS.forEach(n=>{
    const active=STATE.currentScreen===n.id;
    // sidebar
    const sb=document.createElement('button');
    sb.className='nav-btn'+(active?' active':'');
    sb.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${n.icon}</svg>${n.label}`;
    sb.onclick=()=>navigate(n.id);
    snav.appendChild(sb);
    // bottom
    const bb=document.createElement('button');
    bb.className='bnav-btn'+(active?' active':'');
    bb.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${n.icon}</svg>${n.label}`;
    bb.onclick=()=>navigate(n.id);
    bnav.appendChild(bb);
  });
}

function navigate(id){
  STATE.currentScreen=id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-'+id).classList.add('on');
  buildNav();
  renderScreen(id);
}

function renderScreen(id){
  if(id==='dashboard')renderDashboard();
  else if(id==='extrato')renderExtrato();
  else if(id==='orcamentos')renderOrcamentos();
  else if(id==='metas')renderMetas();
  else if(id==='investimentos')renderInvestimentos();
}

// ──────────────────────────────────────────────
// MODAL ENGINE
// ──────────────────────────────────────────────
function openModal(html, id){
  closeModal();
  const overlay=document.createElement('div');
  overlay.className='overlay';
  overlay.id='overlay-'+id;
  overlay.onclick=e=>{if(e.target===overlay)closeModal()};
  overlay.innerHTML=`<div class="modal">${html}</div>`;
  document.getElementById('modals').appendChild(overlay);
}

function closeModal(){
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
}

let txEditId=null;

function openTxModal(editId){
  txEditId=editId||null;
  let tx=null;
  if(txEditId)tx=STATE.transactions.find(t=>t.id===txEditId);

  openModal(`
    <div class="mh">
      <h3>${tx?'Editar lançamento':'Novo lançamento'}</h3>
      <button class="mclose" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="fg">
      <div class="type-toggle">
        <button class="type-btn${!tx||tx.type==='debit'?' tdebit':''}" id="btn-debit" onclick="setTxType('debit')">− Despesa</button>
        <button class="type-btn${tx&&tx.type==='credit'?' tcredit':''}" id="btn-credit" onclick="setTxType('credit')">+ Receita</button>
      </div>
    </div>
    <input type="hidden" id="tx-type" value="${tx?tx.type:'debit'}">
    <div class="fg">
      <label class="fl">Valor (R$)</label>
      <input class="fi" type="number" id="tx-val" placeholder="0,00" step="0.01" min="0.01" inputmode="decimal" value="${tx?tx.value:''}">
    </div>
    <div class="fg">
      <label class="fl">Descrição</label>
      <input class="fi" type="text" id="tx-desc" placeholder="Ex: Almoço, Salário, iFood..." value="${tx?tx.desc:''}" oninput="onDescInput()">
      <div class="cat-pills" id="cat-pills"></div>
    </div>
    <div class="fg">
      <label class="fl">Categoria</label>
      <select class="fi" id="tx-cat">${catOpts}</select>
    </div>
    <div class="fg">
      <label class="fl">Data</label>
      <input class="fi" type="date" id="tx-date" value="${tx?tx.date:todayISO()}">
    </div>
    <div class="fg">
      <label class="fl">Tags (opcional, separadas por vírgula)</label>
      <input class="fi" type="text" id="tx-tags" placeholder="#viagem, #trabalho" value="${tx&&tx.tags?tx.tags.join(', '):''}">
    </div>
    <div class="row mt2" style="gap:8px">
      <button class="btn btn-ghost btn-full" onclick="closeModal()" style="flex:1">Cancelar</button>
      <button class="btn btn-primary btn-full" onclick="saveTx()" style="flex:2">Salvar</button>
    </div>
  `,'tx');
  setTimeout(()=>{
    document.getElementById('tx-val').focus();
    if(tx)onDescInput();
  },80);
}

function setTxType(type){
  document.getElementById('tx-type').value=type;
  document.getElementById('btn-debit').className='type-btn'+(type==='debit'?' tdebit':'');
  document.getElementById('btn-credit').className='type-btn'+(type==='credit'?' tcredit':'');
}

function onDescInput(){
  const desc=document.getElementById('tx-desc').value;
  const top=aiTop3(desc);
  const pills=document.getElementById('cat-pills');
  if(!pills)return;
  pills.innerHTML='';
  // auto-suggest in select
  if(desc.length>1&&!txEditId){
    const predicted=aiPredict(desc);
    const sel=document.getElementById('tx-cat');
    if(predicted&&sel&&sel.value==='alimentacao')sel.value=predicted; // only if default
  }
  top.forEach(catId=>{
    const c=cat(catId);
    const p=document.createElement('button');
    p.className='cpill';p.type='button';
    p.textContent=c.emoji+' '+c.name;
    p.onclick=()=>{document.getElementById('tx-cat').value=catId;pills.innerHTML=''};
    pills.appendChild(p);
  });
}

function saveTx(){
  const val=parseFloat(document.getElementById('tx-val').value);
  const desc=(document.getElementById('tx-desc').value||'').trim();
  const catId=document.getElementById('tx-cat').value;
  const date=document.getElementById('tx-date').value;
  const type=document.getElementById('tx-type').value;
  const tagsRaw=document.getElementById('tx-tags').value;
  const tags=tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);

  if(!val||val<=0){alert('Informe um valor válido (maior que zero)');return}
  if(!desc){alert('Informe uma descrição');return}
  if(!catId){alert('Selecione uma categoria');return}
  if(!date){alert('Informe uma data');return}

  aiLearn(desc,catId);

  const tx={id:txEditId||uid(),value:val,desc,cat:catId,date,type,tags};
  if(txEditId){
    const i=STATE.transactions.findIndex(t=>t.id===txEditId);
    if(i>=0)STATE.transactions[i]=tx;
  }else{
    STATE.transactions.unshift(tx);
    checkAchievements();
    checkBudgetAlerts();
  }
  save();
  closeModal();
  renderAll();
}

  if(!confirm('Excluir este lançamento?'))return;
  STATE.transactions=STATE.transactions.filter(t=>t.id!==id);
  save();closeModal();renderAll();
}

function saveGoal(){
  const name=(document.getElementById('g-name').value||'').trim();
  const total=parseFloat(document.getElementById('g-total').value)||0;
  const saved=parseFloat(document.getElementById('g-saved').value)||0;
  const months=parseInt(document.getElementById('g-months').value)||12;
  const emoji=document.getElementById('g-emoji').value.trim()||'🎯';
  if(!name){alert('Informe o nome do objetivo');return}
  if(!total||total<=0){alert('Informe o valor total necessário');return}
  STATE.goals.push({id:uid(),name,total,saved,months,emoji});
  save();checkAchievements();closeModal();renderMetas();
}

function openGoalDetail(id){
  const g=STATE.goals.find(g=>g.id===id);
  if(!g)return;
  const pct=Math.min(100,Math.round((g.saved/g.total)*100));
  const remaining=Math.max(0,g.total-g.saved);
  const monthly=(remaining/Math.max(1,g.months)).toFixed(2);
  openModal(`
    <div class="mh">
      <h3>${g.emoji} ${g.name}</h3>
      <button class="mclose" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div style="text-align:center;margin-bottom:1.2rem">
      <div style="font-size:2.8rem;margin-bottom:6px">${g.emoji}</div>
      <div style="font-size:1.4rem;font-family:var(--fm);color:var(--green);font-weight:300">${fmtBRL(g.saved)}</div>
      <div style="font-size:.72rem;color:var(--text2);margin-top:2px">de ${fmtBRL(g.total)}</div>
    </div>
    <div class="pbar-wrap mb2">
      <div class="pbar"><div class="pbar-fill ${pct>=100?'pf-green':'pf-accent'}" style="width:${pct}%"></div></div>
      <div class="pbar-lbl mt1"><span>${pct}% concluído</span><span>${g.months} meses</span></div>
    </div>
    <div class="card-sm mb2">
      <div class="row-between mb1" style="font-size:.76rem"><span style="color:var(--text2)">Falta</span><span style="color:var(--amber)">${fmtBRL(remaining)}</span></div>
      <div class="row-between" style="font-size:.76rem"><span style="color:var(--text2)">Aporte mensal necessário</span><span style="color:var(--accent2)">${fmtBRL(monthly)}</span></div>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn btn-danger btn-full" onclick="deleteGoal('${id}')" style="flex:1">Excluir</button>
      <button class="btn btn-primary btn-full" onclick="closeModal();aportarMeta('${id}')" style="flex:2">+ Aportar</button>
    </div>
  `,'goal-detail');
}

function deleteGoal(id){
  if(!confirm('Excluir objetivo?'))return;
  STATE.goals=STATE.goals.filter(g=>g.id!==id);
  save();closeModal();renderMetas();
}

function aportarMeta(id){
  const g=STATE.goals.find(g=>g.id===id);
  if(!g)return;
  const v=prompt(`Aportar para "${g.name}" (R$):`);
  if(!v)return;
  const n=parseFloat(v);
  if(!n||n<=0){alert('Valor inválido');return}
  g.saved=Math.min(g.total,g.saved+n);
  save();
  if(g.saved>=g.total)showToast('🎉','Meta atingida!',g.emoji+' '+g.name+' concluída!');
  renderMetas();renderDashboard();
}

function checkBudgetAlerts(){
  const now=new Date();
  const txs=monthTxs(now.getFullYear(),now.getMonth()).filter(t=>t.type==='debit');
  const totals={};
  txs.forEach(t=>{totals[t.cat]=(totals[t.cat]||0)+t.value});
  Object.entries(STATE.budgets).forEach(([catId,limit])=>{
    const spent=totals[catId]||0;
    const pct=spent/limit*100;
    const c=cat(catId);
    const k80=`alert_${catId}_${now.getFullYear()}_${now.getMonth()}_80`;
    const k100=`alert_${catId}_${now.getFullYear()}_${now.getMonth()}_100`;
    if(pct>=100&&!sessionStorage.getItem(k100)){
      sessionStorage.setItem(k100,'1');
      showToast('⚠️','Limite atingido!',`${c.emoji} ${c.name}: ${fmtBRL(spent)} de ${fmtBRL(limit)}`);
    }else if(pct>=80&&!sessionStorage.getItem(k80)){
      sessionStorage.setItem(k80,'1');
      showToast('🔔','80% do orçamento',`${c.emoji} ${c.name}: ${fmtBRL(spent)} de ${fmtBRL(limit)}`);
    }
  });
}

// RENDER: DASHBOARD
// ──────────────────────────────────────────────
function renderDashboard(){
  const el=document.getElementById('s-dashboard');
  const now=new Date();
  const h=now.getHours();
  const greet=h<12?'Bom dia 👋':h<18?'Boa tarde 👋':'Boa noite 👋';
  const dateStr=now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const y=now.getFullYear(),m=now.getMonth();
  const txs=monthTxs(y,m);
  const rec=txs.filter(t=>t.type==='credit').reduce((s,t)=>s+t.value,0);
  const desp=txs.filter(t=>t.type==='debit').reduce((s,t)=>s+t.value,0);
  const saldo=rec-desp;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const dayN=now.getDate();
  const dLeft=Math.max(1,daysInMonth-dayN+1);
  const comprometido=Object.values(STATE.budgets).reduce((s,v)=>s+v,0);
  const livreTotal=saldo-comprometido;
  const livreDia=livreTotal/dLeft;
  const pctGasto=rec>0?Math.min(100,Math.round(desp/rec*100)):0;
  const barCls=pctGasto<70?'pf-green':pctGasto<90?'pf-amber':'pf-red';
  const badgeCls=pctGasto<70?'bg-green':pctGasto<90?'bg-amber':'bg-red';

  // Emergency
  const {custo,guardado}=STATE.emergency;
  const meses=custo>0?guardado/custo:0;
  const emergPct=Math.min(100,(meses/6)*100);
  const emergColor=emergPct>=100?'var(--green)':emergPct>=50?'var(--amber)':'var(--red)';

  // Insight
  const catTotals={};
  txs.filter(t=>t.type==='debit').forEach(t=>{catTotals[t.cat]=(catTotals[t.cat]||0)+t.value});
  let insightHtml='Comece a registrar seus gastos para receber insights personalizados! 🚀';
  const topEntry=Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  if(topEntry){
    const tc=cat(topEntry[0]);
    const tp=rec>0?Math.round(topEntry[1]/rec*100):0;
    insightHtml=`Maior gasto este mês: <strong>${tc.emoji} ${tc.name}</strong> com <strong>${fmtBRL(topEntry[1])}</strong> (${tp}% da receita). ${tp>30?'Fique de olho! 👀':'Tudo controlado! ✅'}`;
  }

  // Streak
  const txDays=new Set(txs.map(t=>new Date(t.date+'T00:00:00').getDate()));
  let streak=0,cur=0;
  for(let i=1;i<=dayN;i++){if(txDays.has(i)){cur++;streak=Math.max(streak,cur)}else cur=0}
  const showDays=Math.min(daysInMonth,14);
  let dotsHtml='';
  for(let i=1;i<=showDays;i++){
    const cls=txDays.has(i)?'done':i===dayN?'today':'';
    dotsHtml+=`<div class="sdot ${cls}">${i}</div>`;
  }

  // Recent txs
  const recent=STATE.transactions.slice(0,5);
  const recentHtml=recent.length
    ?recent.map(t=>txItemHtml(t)).join('')
    :`<div class="empty"><div class="empty-ico">🧾</div><div class="empty-txt">Nenhum lançamento ainda</div><div class="empty-sub">Toque no + para começar</div></div>`;

  el.innerHTML=`
    <div class="ph"><h2>${greet}</h2><p>${dateStr}</p></div>
    <div class="insight"><span>💡</span><span>${insightHtml}</span></div>
    <div class="saldo-hero">
      <div class="saldo-lbl">Saldo disponível</div>
      <div class="saldo-val" style="color:${saldo>=0?'var(--text)':'var(--red)'}">${fmtBRL(saldo)}</div>
      <div class="saldo-row">
        <div class="saldo-sub"><span>Comprometido</span><span style="color:var(--amber);font-weight:500">${fmtBRL(comprometido)}</span></div>
        <div class="saldo-sub"><span>Livre/dia</span><span style="color:${livreDia>=0?'var(--green)':'var(--red)'};font-weight:500">${fmtBRL(livreDia)}</span></div>
      </div>
    </div>
    <div class="mg">
      <div class="metric"><div class="metric-lbl">Receitas</div><div class="metric-val green">${fmtBRL(rec)}</div></div>
      <div class="metric"><div class="metric-lbl">Despesas</div><div class="metric-val red">${fmtBRL(desp)}</div></div>
    </div>
    <div class="card mb2">
      <div class="row-between mb1">
        <span style="font-family:var(--fh);font-size:.8rem;font-weight:700">Mês atual</span>
        <span class="badge ${badgeCls}">${pctGasto}%</span>
      </div>
      <div class="pbar-wrap">
        <div class="pbar-lbl"><span>Gastos vs. receita</span><span>dia ${dayN} de ${daysInMonth}</span></div>
        <div class="pbar"><div class="pbar-fill ${barCls}" style="width:${pctGasto}%"></div></div>
      </div>
    </div>
    <div class="slabel">Fundo de emergência</div>
    <div class="card mb2">
      <div class="thermo">
        <div class="thermo-bar"><div class="thermo-fill" style="width:${emergPct}%;background:${emergColor}"></div></div>
        <div class="thermo-val" style="color:${emergColor}">${meses.toFixed(1).replace('.',',')} mes${meses!==1?'es':''}</div>
      </div>
      <div style="font-size:.68rem;color:var(--text2);margin-top:7px">${custo>0?`Meta: 6 meses | ${fmtBRL(guardado)} guardados | Custo: ${fmtBRL(custo)}/mês`:'Configure seu fundo de emergência em Metas'}</div>
    </div>
    <div class="slabel">Conquistas — sequência de lançamentos</div>
    <div class="card mb2">
      <div style="font-family:var(--fh);font-size:.78rem;font-weight:700;margin-bottom:2px">Dias com lançamento este mês</div>
      <div class="streak-row">${dotsHtml}</div>
      <div style="font-size:.68rem;color:var(--text2);margin-top:7px">${streak>=7?`🔥 ${streak} dias seguidos! Incrível!`:streak>0?`Sequência atual: ${streak} dia${streak>1?'s':''}. Continue!`:'Registre por 7 dias seguidos para conquistar 🔥'}</div>
    </div>
    <div class="slabel">Últimos lançamentos</div>
    <div class="tx-list">${recentHtml}</div>
  `;
  // attach tx click events
  el.querySelectorAll('.tx-item').forEach(el2=>{
    el2.onclick=()=>openTxDetail(el2.dataset.id);
  });
  if(streak>=7)tryUnlock('streak7','🔥','Semana em chamas!','7 dias seguidos de lançamentos!');
}

function renderExtrato(){
  const el=document.getElementById('s-extrato');
  const cm=STATE.currentMonth;
  const y=cm.getFullYear(),m=cm.getMonth();
  const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const txs=monthTxs(y,m);
  const rec=txs.filter(t=>t.type==='credit').reduce((s,t)=>s+t.value,0);
  const desp=txs.filter(t=>t.type==='debit').reduce((s,t)=>s+t.value,0);
  const sal=rec-desp;
  const af=STATE.activeFilter;

  let filtered=txs;
  if(af==='credit')filtered=txs.filter(t=>t.type==='credit');
  else if(af==='debit')filtered=txs.filter(t=>t.type==='debit');
  else if(af!=='all')filtered=txs.filter(t=>t.cat===af);
  filtered=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));

  // filter chips
  const chips=[
    {key:'all',label:'Todos'},
    {key:'credit',label:'Receitas'},
    {key:'debit',label:'Despesas'},
    ...CATS.map(c=>({key:c.id,label:c.emoji+' '+c.name})),
  ];
  const chipsHtml=chips.map(c=>`<button class="fchip${af===c.key?' active':''}" onclick="setFilter('${c.key}')">${c.label}</button>`).join('');

  const listHtml=filtered.length
    ?filtered.map(t=>txItemHtml(t)).join('')
    :`<div class="empty"><div class="empty-ico">🧾</div><div class="empty-txt">Nenhum lançamento neste período</div></div>`;

  el.innerHTML=`
    <div class="ph"><h2>Extrato</h2></div>
    <div class="mnav">
      <button onclick="changeMonth(-1)">‹</button>
      <span>${MONTHS[m]} ${y}</span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="trow">
      <div class="titem"><div class="titem-lbl">Receitas</div><div class="titem-val green">${fmtBRL(rec)}</div></div>
      <div class="titem"><div class="titem-lbl">Despesas</div><div class="titem-val red">${fmtBRL(desp)}</div></div>
      <div class="titem"><div class="titem-lbl">Saldo</div><div class="titem-val" style="color:${sal>=0?'var(--green)':'var(--red)'}">${fmtBRL(sal)}</div></div>
    </div>
    <div class="frow">${chipsHtml}</div>
    <div class="tx-list">${listHtml}</div>
  `;
  el.querySelectorAll('.tx-item').forEach(el2=>{
    el2.onclick=()=>openTxDetail(el2.dataset.id);
  });
}

function setFilter(f){STATE.activeFilter=f;renderExtrato()}
function changeMonth(dir){
  STATE.currentMonth=new Date(STATE.currentMonth.getFullYear(),STATE.currentMonth.getMonth()+dir,1);
  renderExtrato();
}

    <button onclick="installApp()" style="background:#7c6aff;border:none;border-radius:7px;padding:5px 12px;color:#fff;font-family:Syne,sans-serif;font-size:.75rem;font-weight:700;cursor:pointer">Instalar</button>
    <button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:#8080a8;cursor:pointer;font-size:1rem;padding:0 2px">✕</button>
  `;
  document.body.appendChild(banner);
  setTimeout(() => { if(banner.parentNode) banner.remove(); }, 15000);
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner')?.remove();
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner')?.remove();
  showToast('🎉', 'App instalado!', 'Meu Bolso agora está na sua tela inicial.');
});
</script>
</body>
</html>
